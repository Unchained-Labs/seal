services:
  seal:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      args:
        VITE_OTTER_URL: ${VITE_OTTER_URL:-/api}
    image: seal:local
    environment:
      OTTER_UPSTREAM: ${OTTER_UPSTREAM:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SEAL_PORT:-5173}:80"
    restart: unless-stopped
